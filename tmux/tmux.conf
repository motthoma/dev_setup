### --- Prefix key ---
set -g prefix C-b
unbind C-b
bind C-b send-prefix

### --- Quality of life tweaks ---
set -g mouse on
set -g history-limit 10000
set -sg escape-time 0
set -g mode-keys vi

### --- Vim-style pane actions outside Vim ---
##### Better pane navigation #####

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Splits like vim #####

bind | split-window -h
bind - split-window -v

##### Enter copy mode quickly #####

bind Enter copy-mode

##### Vim-style selection #####

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

##### Yank to system clipboard (Wayland) #####

# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind -T copy-mode-vi Y send -X copy-line

##### Mouse selection → clipboard #####

bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"

bind v copy-mode \; send -X begin-selection

### --- Pane resizing with Alt+arrows ---
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

### --- Status bar ---
# Base colors
set -g status-bg colour235
set -g status-fg colour136
set -g status-interval 5

# Left side: session name
set -g status-left "#[fg=colour46,bold] #S #[fg=colour136,nobold]|"

# Right side: window list + clock
set -g status-right "#[fg=colour136]#I:#W | %Y-%m-%d %H:%M"

# Window style
setw -g window-status-format "#[fg=colour244] #I:#W "
setw -g window-status-current-format "#[fg=colour46,bold] #I:#W "

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1
set -g pane-base-index 1

# Enable pane borders colors
# set -g pane-border-fg colour235
# set -g pane-active-border-fg colour46
